name = "code-task"
description = "Run this field multiple times with `portlang converge` to see convergence analysis and tool usage patterns"

# This is the same task as 02-code-task, designed for repeated runs.
# After N runs, use `portlang report code-task` to see the adaptation report:
# which tools correlate with success, token/cost distributions, verifier signal quality.
#
#   portlang converge examples/06-converge-and-report/field.toml -n 10
#   portlang report code-task

goal = """
Write a Python function called add(a, b) that returns the sum of two numbers.
Save it to add.py. Include a docstring. After writing the file, stop.
"""

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 1.0
max_tokens = 1000

[boundary]
allow_write = ["*.py"]

[context]
max_tokens = 15000
max_cost = "$0.25"
max_steps = 8

[[verifiers]]
name = "tests-pass"
command = "python -c \"import add; assert add.add(2, 3) == 5; assert add.add(-1, 1) == 0; print('OK')\""
trigger = "on_stop"
description = "The add function must return correct results"
