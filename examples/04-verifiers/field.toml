name = "verifiers"
description = "Demonstrates verifier types: custom shell, levenshtein, json, and semantic"

# This example shows how to use both custom shell verifiers and built-in verifier algorithms.
# Run with:
#   portlang run examples/04-verifiers/field.toml

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 0.5

[prompt]
goal = """
Complete three small tasks and write the output of each to a file:

1. Write exactly the text "The quick brown fox jumps over the lazy dog" to greeting.txt
   (no trailing newline, no extra whitespace)

2. Write a JSON object to profile.json with this exact structure:
   { "name": "Alice", "age": 30, "active": true }

3. Write a short paragraph (2-4 sentences) to summary.txt explaining what
   supervised machine learning is, in plain language.

After writing all three files, stop.
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["*.txt", "*.json"]
max_tokens = 30000
max_cost = "$0.25"
max_steps = 10

# ── Shell: custom check triggered after every write call ─────────────────────
# Runs after each tool call named "write". Checks that no unexpected files exist
# in the workspace (only the three expected output files are allowed).
[[verifier]]
type = "shell"
name = "no-extra-files"
command = "test $(ls . | grep -v -E '^(greeting\\.txt|profile\\.json|summary\\.txt)$' | wc -l) -eq 0"
trigger = "on_tool:write"
description = "Only greeting.txt, profile.json, and summary.txt are allowed in the workspace"

# ── Levenshtein: exact or near-exact text match ──────────────────────────────
# Passes when the normalized edit-distance similarity is >= threshold.
# threshold = 1.0 means exact match; lower values allow minor variations.
[[verifier]]
type = "levenshtein"
name = "greeting-exact"
file = "greeting.txt"
expected = "The quick brown fox jumps over the lazy dog"
threshold = 1.0
trigger = "on_stop"
description = "greeting.txt must contain the exact pangram"

# ── JSON: structure validation with schema ────────────────────────────────────
# Checks that profile.json is valid JSON and matches the required schema.
[[verifier]]
type = "json"
name = "profile-schema"
file = "profile.json"
schema = '''
{
  "type": "object",
  "required": ["name", "age", "active"],
  "properties": {
    "name":   { "type": "string" },
    "age":    { "type": "integer", "minimum": 0 },
    "active": { "type": "boolean" }
  },
  "additionalProperties": false
}
'''
trigger = "on_stop"
description = "profile.json must be valid JSON with name (string), age (integer), active (boolean)"

# ── Semantic: embedding cosine similarity ─────────────────────────────────────
# Checks that summary.txt is semantically close to the reference description.
# Uses BAAI/bge-small-en-v1.5 locally by default — no API key required.
# The model (~67 MB) is downloaded from HuggingFace and cached on first run.
[[verifier]]
type = "semantic"
name = "summary-meaning"
file = "summary.txt"
expected = "Supervised machine learning is a type of AI where a model learns from labeled training data to make predictions on new, unseen examples."
threshold = 0.80
trigger = "on_stop"
description = "summary.txt must explain supervised machine learning with similar meaning to the reference"
