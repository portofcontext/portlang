name = "hello-world"
description = "The simplest possible field — no verifiers, minimal budget"

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 1.0

[prompt]
goal = """
Write a Python script called hello.py that prints "Hello, World!" to the console.
After creating the file, stop.
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["*.py"]
max_tokens = 10000
max_cost = "$0.10"
max_steps = 5
