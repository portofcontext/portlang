name = "custom-python-tool"
description = "Define custom tools as Python functions — full language support with PEP 723 inline dependencies"

goal = "Calculate the result of 144 * 259 using the calculator tool. Write the result to result.txt, then stop."

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 0.0
max_tokens = 1000

[environment]
type = "local"
root = "./workspace"

[boundary]
allow_write = ["*.txt"]

[context]
max_tokens = 20000
max_cost = "$0.10"
max_steps = 5

# Custom Python tool. The script must export an `execute(input: dict) -> dict` function.
# PEP 723 inline script dependencies are supported (via uv).
[[tool]]
name = "calculator"
description = "Evaluate a mathematical expression and return the result"
type = "python"
script = "../tools/calculator.py"
function = "execute"

[tool.input_schema]
type = "object"
required = ["expression"]

[tool.input_schema.properties]
expression = { type = "string", description = "The mathematical expression to evaluate (e.g., '42 * 137')" }
