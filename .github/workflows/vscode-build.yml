name: Build VSCode Extension

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload .vsix to (e.g. v0.1.9)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-vscode-extension:
    name: Build VSCode Extension (.vsix)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build portlang-lsp binary
        run: cargo build --release -p portlang-lsp

      - name: Copy binary to VSCode extension
        run: |
          mkdir -p editors/vscode/bin
          cp target/release/portlang-lsp editors/vscode/bin/portlang-lsp
          chmod +x editors/vscode/bin/portlang-lsp

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install npm dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Package VSCode extension
        working-directory: editors/vscode
        run: npm run package

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(gh release list --limit 1 --json tagName -q '.[0].tagName')" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload .vsix to release
        run: |
          VSIX=$(ls editors/vscode/*.vsix | head -1)
          gh release upload "${{ steps.tag.outputs.value }}" "$VSIX" --clobber

      - name: Job summary
        run: |
          VSIX=$(ls editors/vscode/*.vsix | head -1)
          echo "### VSCode Extension Built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Binary: \`target/release/portlang-lsp\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: \`${VSIX}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Uploaded to release: \`${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next step: drag-and-drop at marketplace.visualstudio.com/manage"  >> "$GITHUB_STEP_SUMMARY"
