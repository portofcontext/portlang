name = "write-field"
description = "Test field that writes a file and verifies it"

[model]
name = "claude-sonnet-4-5"
temperature = 1.0

[prompt]
goal = "Read 'template.txt', write its contents to 'output.txt', then stop."

[environment]
root = "."

[boundary]
allow_write = ["output.txt", "*.log"]
max_tokens = 10000
max_cost = "$1.00"

[[verifier]]
name = "check-output"
command = "test -f output.txt"
trigger = "on_stop"
description = "Verify that output.txt was created"
