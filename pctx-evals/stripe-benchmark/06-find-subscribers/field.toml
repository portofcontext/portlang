name = "06_find_subscribers"
description = "Returns Noah Patel who is the only user subscribed to the starter plan in this Stripe account, along with their subscription status which is active"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Which users are subscribed to the starter plan in my Stripe account? Return the subscriber names and subscription statuses as structured JSON written to output.json.
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["output.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30
output_schema = """
{
  "type": "object",
  "required": ["subscribers"],
  "properties": {
    "subscribers": {
      "type": "array",
      "items": {
        "type": "object",
        "required": ["name", "status"],
        "properties": {
          "name":   { "type": "string" },
          "status": { "type": "string" }
        }
      }
    }
  }
}
"""

[[verifier]]
name = "correct-subscriber"
type = "json"
file = "output.json"
schema = '{"properties": {"subscribers": {"contains": {"properties": {"name": {"const": "Noah Patel"}, "status": {"const": "active"}}, "required": ["name", "status"]}}}}'
trigger = "on_stop"
description = "Must include Noah Patel with active status"
