name = "06_find_subscribers"
description = "Returns Noah Patel who is the only user subscribed to the starter plan in this Stripe account, along with their subscription status which is active"

goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Which users are subscribed to the starter plan in my Stripe account? Just return the name of the user and the subscription status.

Write your answer to a file named "result.txt".
"""

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 0.0
max_tokens = 8000

[boundary]
allow_write = ["result.txt", "*.json"]
network = "allow"

[context]
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30

# [code_mode]
# enabled = true

[[mcp_server]]
name = "stripe"
command = "npx"
args = ["-y", "@stripe/mcp"]
env = { STRIPE_SECRET_KEY = "${STRIPE_SECRET_KEY}" }

[[verifiers]]
name = "result-file-exists"
command = """
test -f result.txt
"""
trigger = "on_stop"
description = "result.txt must exist"

[[verifiers]]
name = "contains-expected-text"
command = """
grep -qi "Noah Patel" result.txt && grep -qi "active" result.txt
"""
trigger = "on_stop"
description = "Result must contain: Noah Patel, active"
