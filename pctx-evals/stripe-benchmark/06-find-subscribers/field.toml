name = "06_find_subscribers"
description = "Returns Noah Patel who is the only user subscribed to the starter plan in this Stripe account, along with their subscription status which is active"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Which users are subscribed to the starter plan in my Stripe account? Return the subscriber names and subscription statuses as structured JSON.

At the end of your task, before providing your final structured JSON output, save a record of all MCP tool calls you made to a file called `mcp_calls.json` in the workspace directory. The file should contain a JSON array where each element has:
- "tool_name": the name of the MCP tool called
- "input_raw": the exact input parameters as sent
- "input_schema": a JSON Schema object describing the shape of the input
- "output_raw": the exact output as received
- "output_schema": a JSON Schema object describing the shape of the output
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["mcp_calls.json"]
network = "allow"
max_tokens = 150000
max_cost = "$5.00"
max_steps = 50
output_schema = """
{
  "type": "object",
  "required": ["subscribers"],
  "properties": {
    "subscribers": {
      "type": "array",
      "items": {
        "type": "object",
        "required": ["name", "status"],
        "properties": {
          "name":   { "type": "string" },
          "status": { "type": "string" }
        }
      }
    }
  }
}
"""

[[verifier]]
name = "correct-subscriber"
type = "json"
schema = '{"properties": {"subscribers": {"contains": {"properties": {"name": {"const": "Noah Patel"}, "status": {"const": "active"}}, "required": ["name", "status"]}}}}'
trigger = "on_stop"
description = "Must include Noah Patel with active status"
