name = "05_find_customer_by_employer"
description = "Returns Fang Nguyen and their email because they are the only customer with employer Sable Tech"

goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Who works on the CI pipeline at Sable Tech and what's their email? Just return the customer's name and email address.

Write your answer to a file named "result.txt".
"""

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 0.0
max_tokens = 8000

[environment]
type = "local"
root = "./workspace"

[boundary]
allow_write = ["result.txt", "*.json"]
network = "allow"

[context]
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30

# [code_mode]
# enabled = true

[[mcp_server]]
name = "stripe"
command = "npx"
args = ["-y", "@stripe/mcp"]
env = { STRIPE_SECRET_KEY = "${STRIPE_SECRET_KEY}" }

[[verifiers]]
name = "result-file-exists"
command = """
test -f result.txt
"""
trigger = "on_stop"
description = "result.txt must exist"

[[verifiers]]
name = "contains-expected-text"
command = """
grep -qi "Fang Nguyen" result.txt && grep -qi "fang.nguyen@sable.cloud" result.txt
"""
trigger = "on_stop"
description = "Result must contain: Fang Nguyen, fang.nguyen@sable.cloud"
