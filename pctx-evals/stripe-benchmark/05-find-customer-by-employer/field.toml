name = "05_find_customer_by_employer"
description = "Returns Fang Nguyen and their email because they are the only customer with employer Sable Tech"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Who works on the CI pipeline at Sable Tech and what's their email? Return the customer's name and email as structured JSON written to output.json.
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["output.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30
output_schema = """
{
  "type": "object",
  "required": ["name", "email"],
  "properties": {
    "name":  { "type": "string" },
    "email": { "type": "string" }
  }
}
"""

[[verifier]]
name = "correct-customer"
type = "json"
file = "output.json"
schema = '{"properties": {"name": {"const": "Fang Nguyen"}, "email": {"const": "fang.nguyen@sable.cloud"}}}'
trigger = "on_stop"
description = "Must return Fang Nguyen with email fang.nguyen@sable.cloud"
