name = "05_find_customer_by_employer"
description = "Returns Fang Nguyen and their email because they are the only customer with employer Sable Tech"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Who works on the CI pipeline at Sable Tech and what's their email? Return the customer's name and email as structured JSON.

At the end of your task, before providing your final structured JSON output, save a record of all MCP tool calls you made to a file called `mcp_calls.json` in the workspace directory. The file should contain a JSON array where each element has:
- "tool_name": the name of the MCP tool called
- "input_raw": the exact input parameters as sent
- "input_schema": a JSON Schema object describing the shape of the input
- "output_raw": the exact output as received
- "output_schema": a JSON Schema object describing the shape of the output
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["mcp_calls.json"]
network = "allow"
max_tokens = 150000
max_cost = "$5.00"
max_steps = 50
output_schema = """
{
  "type": "object",
  "required": ["name", "email"],
  "properties": {
    "name":  { "type": "string" },
    "email": { "type": "string" }
  }
}
"""

[[verifier]]
name = "correct-customer"
type = "json"
schema = '{"properties": {"name": {"const": "Fang Nguyen"}, "email": {"const": "fang.nguyen@sable.cloud"}}}'
trigger = "on_stop"
description = "Must return Fang Nguyen with email fang.nguyen@sable.cloud"
