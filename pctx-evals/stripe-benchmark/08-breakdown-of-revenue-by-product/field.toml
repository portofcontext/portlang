name = "08_breakdown_of_revenue_by_product"
description = "Returns the product names and their total revenue"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: What is the breakdown of revenue by product in my Stripe account? Just return the product names and their total revenue.

Write your answer to a file named "result.txt".
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["result.txt", "*.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30

[[verifier]]
name = "result-file-exists"
command = """
test -f result.txt
"""
trigger = "on_stop"
description = "result.txt must exist"

[[verifier]]
name = "contains-expected-text"
command = """
grep -qi "revenue" result.txt && grep -qi "product" result.txt
"""
trigger = "on_stop"
description = "Result must contain: revenue, product"
