name = "12_create_payment_link"
description = "Creates a reusable payment link for the Team Training Workshop product that charges $1500 USD and collects the customer's email address"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Create a payment link for the Team Training Workshop product that charges $1500 USD. The link should be reusable and collect the customer's email. Return the URL and product details as structured JSON.

At the end of your task, before providing your final structured JSON output, save a record of all MCP tool calls you made to a file called `mcp_calls.json` in the workspace directory. The file should contain a JSON array where each element has:
- "tool_name": the name of the MCP tool called
- "input_raw": the exact input parameters as sent
- "input_schema": a JSON Schema object describing the shape of the input
- "output_raw": the exact output as received
- "output_schema": a JSON Schema object describing the shape of the output
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["mcp_calls.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 50
output_schema = """
{
  "type": "object",
  "required": ["url", "product", "amount"],
  "properties": {
    "url":     { "type": "string", "pattern": "^https://" },
    "product": { "type": "string" },
    "amount":  { "type": "integer", "minimum": 1 }
  }
}
"""

[[verifier]]
name = "correct-payment-link"
type = "json"
schema = '{"properties": {"url": {"pattern": "buy\\.stripe\\.com/test_"}, "product": {"const": "Team Training Workshop"}, "amount": {"const": 150000}}}'
trigger = "on_stop"
description = "URL must be a Stripe test payment link, product must be Team Training Workshop, amount must be 150000 cents ($1500)"
