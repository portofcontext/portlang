name = "12_create_payment_link"
description = "Creates a reusable payment link for the Team Training Workshop product that charges $1500 USD and collects the customer's email address. Returns the URL of the payment link"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Create a payment link for the Team Training Workshop product that charges $1500 USD. The payment link should be reusable and should collect the customer's email address. Return the URL of the payment link.

Write your answer to a file named "result.txt".
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["result.txt", "*.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30

[[verifier]]
name = "result-file-exists"
command = """
test -f result.txt
"""
trigger = "on_stop"
description = "result.txt must exist"

[[verifier]]
name = "contains-expected-text"
command = """
grep -qi "buy.stripe.com/test_" result.txt && grep -qi "Team Training Workshop" result.txt && grep -qiE "1[,]?500" result.txt
"""
trigger = "on_stop"
description = "Result must contain: buy.stripe.com/test_, Team Training Workshop, 1500 (with or without comma)"
