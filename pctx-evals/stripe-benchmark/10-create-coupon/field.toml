name = "10_create_coupon"
description = "Reports the before count, creates a 25.5% off one-time-use coupon named EVAL25 with full JSON data, reports the after count, and confirms the count increased by 1"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: First, count how many coupons exist. Then create a one-time-use 25.5% off coupon with the name "EVAL25" that applies to all products. Then count coupons again. Return the before count, the created coupon data, and the after count as structured JSON.

At the end of your task, before providing your final structured JSON output, save a record of all MCP tool calls you made to a file called `mcp_calls.json` in the workspace directory. The file should contain a JSON array where each element has:
- "tool_name": the name of the MCP tool called
- "input_raw": the exact input parameters as sent
- "input_schema": a JSON Schema object describing the shape of the input
- "output_raw": the exact output as received
- "output_schema": a JSON Schema object describing the shape of the output
"""

[environment]
root = "./workspace"
code_mode_enabled = "inherit"

[boundary]
allow_write = ["mcp_calls.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 50
output_schema = """
{
  "type": "object",
  "required": ["before_count", "coupon", "after_count"],
  "properties": {
    "before_count": { "type": "integer", "minimum": 0 },
    "coupon": {
      "type": "object",
      "required": ["id", "name", "percent_off", "max_redemptions"],
      "properties": {
        "id":               { "type": "string" },
        "name":             { "type": "string" },
        "percent_off":      { "type": "number" },
        "max_redemptions":  { "type": "integer" }
      }
    },
    "after_count": { "type": "integer", "minimum": 1 }
  }
}
"""

[[verifier]]
name = "coupon-created"
type = "json"
schema = '{"properties": {"coupon": {"properties": {"name": {"const": "EVAL25"}, "percent_off": {"const": 25.5}, "max_redemptions": {"const": 1}}}}}'
trigger = "on_stop"
description = "Coupon must be named EVAL25 with 25.5% off and max_redemptions=1"
