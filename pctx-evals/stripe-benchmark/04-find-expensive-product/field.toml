name = "04_find_expensive_product"
description = "Returns the Team Training Weekend product because its the most expensive product at GBP 999,999.99"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: What's the most expensive product in my Stripe account? Return the product name and price as structured JSON.

At the end of your task, before providing your final structured JSON output, save a record of all MCP tool calls you made to a file called `mcp_calls.json` in the workspace directory. The file should contain a JSON array where each element has:
- "tool_name": the name of the MCP tool called
- "input_raw": the exact input parameters as sent
- "input_schema": a JSON Schema object describing the shape of the input
- "output_raw": the exact output as received
- "output_schema": a JSON Schema object describing the shape of the output
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["mcp_calls.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 50
output_schema = """
{
  "type": "object",
  "required": ["name", "amount", "currency"],
  "properties": {
    "name":     { "type": "string" },
    "amount":   { "type": "integer" },
    "currency": { "type": "string" }
  }
}
"""

[[verifier]]
name = "correct-product"
type = "json"
schema = '{"properties": {"name": {"const": "Team Training Weekend"}}}'
trigger = "on_stop"
description = "Most expensive product must be Team Training Weekend"
