name = "04_find_expensive_product"
description = "Returns the Team Training Weekend product because its the most expensive product at GBP 999,999.99"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: What's the most expensive product in my Stripe account? Return the product name and price as structured JSON written to output.json.
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["output.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30
output_schema = """
{
  "type": "object",
  "required": ["name", "amount", "currency"],
  "properties": {
    "name":     { "type": "string" },
    "amount":   { "type": "integer" },
    "currency": { "type": "string" }
  }
}
"""

[[verifier]]
name = "correct-product"
type = "json"
file = "output.json"
schema = '{"properties": {"name": {"const": "Team Training Weekend"}}}'
trigger = "on_stop"
description = "Most expensive product must be Team Training Weekend"
