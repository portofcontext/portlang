name = "04_find_expensive_product"
description = "Returns the Team Training Weekend product because its the most expensive product at GBP 999,999.99"

goal = """
You have access to a Stripe MCP server connected to a test account.

Task: What's the most expensive product in my Stripe account? Give me the name and amount for the product.

Write your answer to a file named "result.txt".
"""

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 0.0
max_tokens = 8000

[boundary]
allow_write = ["result.txt", "*.json"]
network = "allow"

[context]
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30

# [code_mode]
# enabled = true

[[mcp_server]]
name = "stripe"
command = "npx"
args = ["-y", "@stripe/mcp"]
env = { STRIPE_SECRET_KEY = "${STRIPE_SECRET_KEY}" }

[[verifiers]]
name = "result-file-exists"
command = """
test -f result.txt
"""
trigger = "on_stop"
description = "result.txt must exist"

[[verifiers]]
name = "contains-expected-text"
command = """
grep -qi "Team Training Weekend" result.txt
"""
trigger = "on_stop"
description = "Result must contain: Team Training Weekend"
