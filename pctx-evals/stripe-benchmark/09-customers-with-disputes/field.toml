name = "09_customers_with_disputes"
description = "Returns the customers who have had disputes along with their name, email, and the number of disputes they've had"

goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Which customers have had disputes in my Stripe account? Just return the customer's name, email, and the number of disputes they've had.

Write your answer to a file named "result.txt".
"""

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 0.0
max_tokens = 8000

[boundary]
allow_write = ["result.txt", "*.json"]
network = "allow"

[context]
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30

# [code_mode]
# enabled = true

[[mcp_server]]
name = "stripe"
command = "npx"
args = ["-y", "@stripe/mcp"]
env = { STRIPE_SECRET_KEY = "${STRIPE_SECRET_KEY}" }

[[verifiers]]
name = "result-file-exists"
command = """
test -f result.txt
"""
trigger = "on_stop"
description = "result.txt must exist"

[[verifiers]]
name = "contains-expected-text"
command = """
grep -qi "disputes" result.txt && grep -qi "customer" result.txt && grep -qi "email" result.txt
"""
trigger = "on_stop"
description = "Result must contain: disputes, customer, email"
