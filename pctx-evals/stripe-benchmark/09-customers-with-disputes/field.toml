name = "09_customers_with_disputes"
description = "Returns the customers who have had disputes along with their name, email, and the number of disputes they've had"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Which customers have had disputes in my Stripe account? Return each customer's name, email, and dispute count as structured JSON.

At the end of your task, before providing your final structured JSON output, save a record of all MCP tool calls you made to a file called `mcp_calls.json` in the workspace directory. The file should contain a JSON array where each element has:
- "tool_name": the name of the MCP tool called
- "input_raw": the exact input parameters as sent
- "input_schema": a JSON Schema object describing the shape of the input
- "output_raw": the exact output as received
- "output_schema": a JSON Schema object describing the shape of the output
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["mcp_calls.json"]
network = "allow"
max_tokens = 150000
max_cost = "$5.00"
max_steps = 50
output_schema = """
{
  "type": "object",
  "required": ["customers"],
  "properties": {
    "customers": {
      "type": "array",
      "minItems": 1,
      "items": {
        "type": "object",
        "required": ["name", "email", "dispute_count"],
        "properties": {
          "name":          { "type": "string" },
          "email":         { "type": "string" },
          "dispute_count": { "type": "integer", "minimum": 1 }
        }
      }
    }
  }
}
"""
