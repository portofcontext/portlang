name = "02_list_customers_limit_3"
description = "Returns exactly 3 customers with their IDs"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: List exactly 3 customers from this Stripe account. Just return their customer IDs.

Write your answer to a file named "result.txt".
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["result.txt", "*.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30

[[verifier]]
name = "result-file-exists"
command = """
test -f result.txt
"""
trigger = "on_stop"
description = "result.txt must exist"

[[verifier]]
name = "contains-expected-text"
command = """
grep -qi "cus_" result.txt
"""
trigger = "on_stop"
description = "Result must contain: cus_, @"
