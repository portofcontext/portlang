name = "03_get_balance"
description = "Returns Stripe Account balance information with available and pending amounts which are both 0 in this test account"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: What is the current balance on this Stripe account? Include both available and pending amounts. Return your answer as structured JSON.

At the end of your task, before providing your final structured JSON output, save a record of all MCP tool calls you made to a file called `mcp_calls.json` in the workspace directory. The file should contain a JSON array where each element has:
- "tool_name": the name of the MCP tool called
- "input_raw": the exact input parameters as sent
- "input_schema": a JSON Schema object describing the shape of the input
- "output_raw": the exact output as received
- "output_schema": a JSON Schema object describing the shape of the output
"""

[environment]
root = "./workspace"
code_mode_enabled = "inherit"

[boundary]
allow_write = ["mcp_calls.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 50
output_schema = """
{
  "type": "object",
  "required": ["available_amount", "pending_amount", "currency"],
  "properties": {
    "available_amount": { "type": "integer" },
    "pending_amount":   { "type": "integer" },
    "currency":         { "type": "string" }
  }
}
"""

[[verifier]]
name = "balance-is-zero"
type = "json"
schema = '{"properties": {"available_amount": {"const": 0}, "pending_amount": {"const": 0}}}'
trigger = "on_stop"
description = "Test account balance must be 0 available and 0 pending"
