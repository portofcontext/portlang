name = "03_get_balance"
description = "Returns Stripe Account balance information with available and pending amounts which are both 0 in this test account"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: What is the current balance on this Stripe account? Include both available and pending amounts. Write your answer as structured JSON to output.json.
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["output.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30
output_schema = """
{
  "type": "object",
  "required": ["available_amount", "pending_amount", "currency"],
  "properties": {
    "available_amount": { "type": "integer" },
    "pending_amount":   { "type": "integer" },
    "currency":         { "type": "string" }
  }
}
"""
