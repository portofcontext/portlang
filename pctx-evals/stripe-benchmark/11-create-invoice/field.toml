name = "11_create_invoice"
description = "Creates a draft invoice for charlotte.souza@synapseio.com including data migration ($5000) and white glove onboarding ($2500), total $7500"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Create an invoice for Charlotte Souza at SynapseIO for a data migration service and white glove onboarding. Return the invoice ID, line items, and total as structured JSON written to output.json.
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["output.json"]
network = "allow"
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30
output_schema = """
{
  "type": "object",
  "required": ["invoice_id", "total", "line_items"],
  "properties": {
    "invoice_id": { "type": "string" },
    "total":      { "type": "integer", "minimum": 1 },
    "line_items": {
      "type": "array",
      "minItems": 2,
      "items": {
        "type": "object",
        "required": ["description", "amount"],
        "properties": {
          "description": { "type": "string" },
          "amount":      { "type": "integer", "minimum": 1 }
        }
      }
    }
  }
}
"""

[[verifier]]
name = "correct-total"
type = "json"
file = "output.json"
schema = '{"properties": {"total": {"const": 750000}}}'
trigger = "on_stop"
description = "Invoice total must be 750000 cents ($7500)"
