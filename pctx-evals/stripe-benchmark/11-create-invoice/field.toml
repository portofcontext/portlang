name = "11_create_invoice"
description = "Creates a draft invoice for the customer with email charlotte.souza@synapseio.com which includes the data migration product ($5000 USD) and white glove onboarding ($2500 USD). The total should be $7500 USD. The output should include detail about the line items and the total amount"

goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Create an invoice for Charlotte Souza at SynapseIO to charge them for a data migration service and white glove onboarding. Return the invoice including the total and the line items.

Write your answer to a file named "result.txt".
"""

[model]
name = "anthropic/claude-sonnet-4.6"
temperature = 0.0
max_tokens = 8000

[boundary]
allow_write = ["result.txt", "*.json"]
network = "allow"

[context]
max_tokens = 150000
max_cost = "$2.00"
max_steps = 30

# [code_mode]
# enabled = true

[[mcp_server]]
name = "stripe"
command = "npx"
args = ["-y", "@stripe/mcp"]
env = { STRIPE_SECRET_KEY = "${STRIPE_SECRET_KEY}" }

[[verifiers]]
name = "result-file-exists"
command = """
test -f result.txt
"""
trigger = "on_stop"
description = "result.txt must exist"

[[verifiers]]
name = "contains-expected-text"
command = """
grep -qi "invoice" result.txt && grep -qi "7500" result.txt
"""
trigger = "on_stop"
description = "Result must contain: invoice, 7500"
