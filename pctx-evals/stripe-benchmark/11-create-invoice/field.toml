name = "11_create_invoice"
description = "Creates a draft invoice for charlotte.souza@synapseio.com including data migration ($5000) and white glove onboarding ($2500), total $7500"

model = "inherit"
tools = "inherit"

[prompt]
goal = """
You have access to a Stripe MCP server connected to a test account.

Task: Create an invoice for Charlotte Souza at SynapseIO for a data migration service and white glove onboarding. Return the invoice ID, line items, and total as structured JSON.

At the end of your task, before providing your final structured JSON output, save a record of all MCP tool calls you made to a file called `mcp_calls.json` in the workspace directory. The file should contain a JSON array where each element has:
- "tool_name": the name of the MCP tool called
- "input_raw": the exact input parameters as sent
- "input_schema": a JSON Schema object describing the shape of the input
- "output_raw": the exact output as received
- "output_schema": a JSON Schema object describing the shape of the output
"""

[environment]
root = "./workspace"

[boundary]
allow_write = ["mcp_calls.json"]
network = "allow"
max_tokens = 150000
max_cost = "$5.00"
max_steps = 50
output_schema = """
{
  "type": "object",
  "required": ["invoice_id", "total", "line_items"],
  "properties": {
    "invoice_id": { "type": "string" },
    "total":      { "type": "integer", "minimum": 1 },
    "line_items": {
      "type": "array",
      "minItems": 2,
      "items": {
        "type": "object",
        "required": ["description", "amount"],
        "properties": {
          "description": { "type": "string" },
          "amount":      { "type": "integer", "minimum": 1 }
        }
      }
    }
  }
}
"""

[[verifier]]
name = "correct-total"
type = "json"
schema = '{"properties": {"total": {"const": 75000}}}'
trigger = "on_stop"
description = "Invoice total must be 75000 cents ($7500)"
